name: 💬 Auto Comment on Contributor Issues

on:
    issues:
        types: [opened]

permissions:
    issues: write

jobs:
    comment:
        runs-on: ubuntu-latest

        steps:
            - name: 💡 Check if author is not the owner
              id: check_owner
              run: |
                  ASSOCIATION="${{ github.event.issue.author_association }}"
                  if [ "$ASSOCIATION" != "OWNER" ] && [ "$ASSOCIATION" != "MEMBER" ] && [ "$ASSOCIATION" != "COLLABORATOR" ]; then
                    echo "is_contributor=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_contributor=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 🔍 Check if this is their first contribution
              id: check_first
              if: steps.check_owner.outputs.is_contributor == 'true'
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  result-encoding: string
                  script: |
                      const username = context.payload.issue.user.login;
                      const { data: result } = await github.rest.search.issuesAndPullRequests({
                        q: `author:${username} repo:${context.repo.owner}/${context.repo.repo} is:issue`
                      });
                      return result.total_count === 1 ? 'true' : 'false';

            - name: 🎉 Post greeting for first-time contributor
              if: steps.check_first.outputs.result == 'true'
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `🎉 Namaste, @${context.payload.issue.user.login}! Welcome to SahiDawa🩺

                        Thank you so much for opening your first issue! We are thrilled to have you here. 
                        If you are participating in **GSSoC 2026**, please ensure you wait to be formally assigned before starting work on a Pull Request.

                        Our maintainers will review this issue shortly. While you wait, feel free to read our [Developer Guide](https://github.com/RatLoopz/sahidawa-india/blob/main/docs/code-guide.md) or join our [Discord Community](https://discord.gg/dvbDuJVwNa). 🙌`
                        });

            - name: 💬 Post thank-you comment for returning contributor
              if: steps.check_first.outputs.result == 'false'
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `👋 Welcome back, @${context.payload.issue.user.login}! Thanks for opening another issue for SahiDawa. 🚀

                        Your continued contributions are helping build a safer healthcare ecosystem for 1.4 billion Indians. Our maintainers will review this shortly. 

                        If this is a **GSSoC 2026** issue claim, please hold tight until we formally assign it to you! ⏳`
                      });
