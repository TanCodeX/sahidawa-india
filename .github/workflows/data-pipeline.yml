name: SahiDawa Data Pipeline (ETL + ML)

on:
  schedule:
    # Run every night at 18:00 UTC (11:30 PM IST)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip' # cache pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install ETL dependencies
          if [ -f apps/etl/requirements.txt ]; then
            pip install -r apps/etl/requirements.txt
          fi
          
          # Install ML agent dependencies (if they are separate)
          if [ -f apps/ml/requirements.txt ]; then
            pip install -r apps/ml/requirements.txt
          fi
          
          # Install playwright browsers
          playwright install chromium

      - name: Run ETL Pipeline (Jan Aushadhi & CDSCO Alerts)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/apps/etl:${{ github.workspace }}/apps/ml
        run: |
          cd apps/etl
          python run_all.py
